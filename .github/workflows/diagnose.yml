name: Diagnose Proxmox
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check host network config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PVE_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          script: |
            echo "=== ALL BRIDGES ==="
            ip -br addr show | grep -E "(vmbr|br|eth|ens)"
            echo ""
            echo "=== /etc/network/interfaces ==="
            cat /etc/network/interfaces 2>/dev/null || echo "not found"
            echo ""
            echo "=== IPTABLES NAT ==="
            iptables -t nat -L POSTROUTING -n -v 2>/dev/null | head -10
            echo ""
            echo "=== IP FORWARDING ==="
            sysctl net.ipv4.ip_forward
